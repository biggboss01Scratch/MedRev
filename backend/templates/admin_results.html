<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>审核结果页 - MedRev</title>
    <style>
        :root {
            --line: rgba(141, 166, 204, 0.22);
            --text: #edf4ff;
            --muted: #96a8c6;
            --accent: #6ee7ff;
            --shadow: 0 18px 54px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(110, 231, 255, 0.14), transparent 28%),
                radial-gradient(circle at top right, rgba(139, 92, 246, 0.18), transparent 25%),
                linear-gradient(160deg, #060b15 0%, #0b1324 44%, #101a31 100%);
        }

        .page-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1400;
            border-bottom: 1px solid rgba(141, 166, 204, 0.25);
            background: rgba(8, 17, 32, 0.92);
            backdrop-filter: blur(10px);
        }

        .page-nav-inner {
            width: min(1180px, calc(100vw - 24px));
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .nav-link {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .04);
            color: var(--text);
            font-size: 13px;
            text-decoration: none;
        }

        .nav-link.active {
            border-color: rgba(110, 231, 255, 0.35);
            background: rgba(110, 231, 255, 0.14);
            color: #d8fbff;
        }

        .shell {
            width: min(1180px, calc(100vw - 24px));
            margin: 0 auto;
            padding: 84px 0 28px;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(13, 23, 43, 0.92), rgba(8, 17, 32, 0.85));
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 18px 20px;
            margin-bottom: 14px;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        .eyebrow {
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--accent);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.5;
        }

        .pill {
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, .04);
            color: var(--text);
            font-size: 13px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card-head {
            padding: 16px 18px 0;
        }

        .card-title {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .card-subtitle {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .card-body {
            padding: 16px 18px 18px;
            display: grid;
            gap: 10px;
        }

        .list-item {
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .03);
            font-size: 13px;
            line-height: 1.5;
        }

        .list-item-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .list-item-meta {
            color: var(--muted);
            margin-top: 4px;
        }

        .review-feed {
            display: grid;
            gap: 8px;
        }

        .review-item {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        .review-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .review-main {
            font-size: 14px;
            font-weight: 600;
        }

        .review-sub {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
        }

        @media (max-width: 760px) {
            .page-nav-inner {
                width: min(100vw - 18px, 100%);
                align-items: flex-start;
                flex-direction: column;
            }

            .shell {
                width: min(100vw - 18px, 100%);
                padding: 132px 0 18px;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .topbar {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <nav class="page-nav">
        <div class="page-nav-inner">
            <div class="nav-links">
                <a class="nav-link" href="/admin">主页</a>
                <a class="nav-link active" href="/admin/results">结果页</a>
                <a class="nav-link" href="/admin/settings">设置页</a>
                <a class="nav-link" href="/doctor">医生页</a>
            </div>
            <a class="nav-link" href="{{ url_for('logout') }}">登出</a>
        </div>
    </nav>

    <div class="shell">
        <header class="card topbar">
            <div>
                <div class="eyebrow">MedRev Admin Results</div>
                <h1>审核结果页</h1>
                <p class="subtitle">集中查看结果分布与最近审核记录，便于追溯与统计分析。</p>
            </div>
            <div class="pill" id="runIdPill">run_id: -</div>
        </header>

        <section class="grid-2">
            <div class="card">
                <div class="card-head">
                    <h2 class="card-title">结果分布</h2>
                    <p class="card-subtitle">当前轮次各审核结果计数。</p>
                </div>
                <div class="card-body" id="resultCounts"></div>
            </div>
            <div class="card">
                <div class="card-head">
                    <h2 class="card-title">错误类型分布</h2>
                    <p class="card-subtitle">页面二伪标签错误类型统计。</p>
                </div>
                <div class="card-body" id="errorTypeCounts"></div>
            </div>
        </section>

        <section class="card">
            <div class="card-head">
                <h2 class="card-title">最近审核记录</h2>
                <p class="card-subtitle">最新 12 条原始审核记录，便于追查。</p>
            </div>
            <div class="card-body review-feed" id="recentReviews"></div>
        </section>
    </div>

    <script>
        const el = (id) => document.getElementById(id)

        function reviewBadge(result) {
            const map = {
                gt_correct: 'GT 正确',
                gt_error: 'GT 有误',
                pseudo_label_correct: '伪标签正确',
                pseudo_label_error: '伪标签错误',
            }
            return map[result] || result || '—'
        }

        async function loadSummary() {
            const res = await fetch('/admin/summary')
            if (!res.ok) {
                alert('加载管理统计失败')
                return
            }
            const summary = await res.json()
            el('runIdPill').textContent = `run_id: ${summary.run_id || '-'}`

            const reviews = summary.reviews.result_counts
            el('resultCounts').innerHTML = [
                ['GT 正确', reviews.gt_correct],
                ['GT 有误', reviews.gt_error],
                ['伪标签正确', reviews.pseudo_label_correct],
                ['伪标签错误', reviews.pseudo_label_error],
            ].map(([label, value]) => `
                <div class="list-item">
                    <div class="list-item-head"><div>${label}</div><div>${value}</div></div>
                    <div class="list-item-meta">原始审核结果计数</div>
                </div>
            `).join('')

            const errors = summary.reviews.error_type_counts
            el('errorTypeCounts').innerHTML = [
                ['类别错误', errors.category_error],
                ['框大小错误', errors.box_size_error],
                ['误检', errors.false_positive],
                ['漏检', errors.false_negative],
            ].map(([label, value]) => `
                <div class="list-item">
                    <div class="list-item-head"><div>${label}</div><div>${value}</div></div>
                    <div class="list-item-meta">页面二错误类型统计</div>
                </div>
            `).join('')

            const recent = summary.recent_reviews || []
            el('recentReviews').innerHTML = recent.length
                ? recent.map((item) => `
                    <div class="review-item">
                        <div class="review-top">
                            <div class="review-main"><strong>${item.task_id || '—'}</strong> · ${reviewBadge(item.review_result)}</div>
                            <div class="pill">${item.reviewer_id || 'unknown'}</div>
                        </div>
                        <div class="review-sub">${item.task_type || '—'} · ${item.error_type || '无错误类型'} · ${item.submitted_at || '—'}</div>
                    </div>
                `).join('')
                : '<div class="review-item"><div class="review-main">暂无审核记录</div></div>'
        }

        loadSummary()
    </script>
</body>

</html>
